<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />

  <title>Support — Check Rates</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">

  <!-- CSS: база + раскладка + стили страницы support -->

  <!-- ── Верхняя шапка ── -->
